openapi: 3.1.0
info:
  title: Ujin Platform API
  version: 1.0.0
  description: 'API платформы Ujin. Предоставляет доступ к данным о комплексах, зданиях,

    парковках, кладовках и новостях.


    **Токены** (20 шт.) имеют доступ к 1–2 зданиям каждый:

    - token 01 → здания 121,122

    - token 02 → здания 123,124

    - …

    - token 20 → здания 159,160

    '
servers:
- url: https://api-uae-test.ujin.tech
  description: Staging (UAE)
- url: http://localhost:9999
  description: Local dev
tags:
- name: Объекты недвижимости
  description: Комплексы и здания
- name: Паркинг
  description: Парковочные места с фильтрацией
- name: Кладовые
  description: Кладовые помещения с фильтрацией
- name: Новости
  description: Новости и объявления
paths:
  /v1/complex/list/:
    get:
      tags:
      - Объекты недвижимости
      summary: Список комплексов
      description: Возвращает список доступных ЖК
      operationId: getComplexList
      parameters:
      - name: token
        in: query
        description: Токен авторизации
        required: true
        schema:
          type: string
          examples:
          - ust-0000000-00000000000000000000000000000001
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  command:
                    type: string
                    examples:
                    - api->v1->complex->list
                  message:
                    type: string
                    examples:
                    - ''
                  error:
                    type: integer
                    examples:
                    - 0
                  data:
                    type: object
                    properties:
                      items:
                        type: array
                        items:
                          $ref: '#/components/schemas/ComplexItem'
                      links:
                        $ref: '#/components/schemas/PaginationLinks'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
              examples:
              - command: api->v1->complex->list
                message: ''
                error: 0
                data:
                  items:
                  - id: 63
                    title: hackaton2026\1
                    region:
                      id: 1
                      title: Москва
                    paid_tickets_enabled: true
                  - id: 64
                    title: hackaton2026\2
                    region:
                      id: 1
                      title: Москва
                    paid_tickets_enabled: true
                  links:
                    first: https://api-uae-test.ujin.tech/api/v1/complex/list?page=1
                    last: https://api-uae-test.ujin.tech/api/v1/complex/list?page=1
                    prev: null
                    next: null
                  meta:
                    current_page: 1
                    from: 1
                    last_page: 1
                    path: https://api-uae-test.ujin.tech/api/v1/complex/list
                    per_page: 500
                    to: 20
                    total: 20
        '401':
          $ref: '#/components/responses/Unauthorized'
  /v1/buildings/get-list-crm/:
    get:
      tags:
      - Объекты недвижимости
      summary: Список зданий
      description: Возвращает список зданий с детальной информацией
      operationId: getBuildingsList
      parameters:
      - name: token
        in: query
        description: Токен авторизации
        required: true
        schema:
          type: string
          examples:
          - ust-0000000-00000000000000000000000000000001
      - name: per_page
        in: query
        description: Количество на страницу
        required: false
        schema:
          type: integer
          examples:
          - 1000
      - name: page
        in: query
        description: Номер страницы
        required: false
        schema:
          type: integer
          examples:
          - 1
      - name: complex_id
        in: query
        description: Фильтр по ID ЖК
        required: false
        schema:
          type: integer
          examples:
          - 63
      - name: search
        in: query
        description: Поиск по адресу
        required: false
        schema:
          type: string
          examples:
          - Здание
      responses:
        '200':
          description: Успешный ответ
          content:
            application/json:
              schema:
                type: object
                properties:
                  command:
                    type: string
                    examples:
                    - api->v1->buildings->get-list-crm
                  message:
                    type: string
                    examples:
                    - ''
                  error:
                    type: integer
                    examples:
                    - 0
                  data:
                    type: object
                    properties:
                      buildings:
                        type: array
                        items:
                          $ref: '#/components/schemas/BuildingItem'
                      meta:
                        $ref: '#/components/schemas/PaginationMeta'
              examples:
              - command: api->v1->buildings->get-list-crm
                message: ''
                error: 0
                data:
                  buildings:
                  - id: 121
                    complex:
                      id: 63
                      title: hackaton2026\1
                      timezone: Europe/Moscow
                    building:
                      id: 121
                      title: Здание № 1/1
                      alias: ''
                      floor: 10
                      apartmentCount: 36
                      entranceCount: 2
                      address:
                        city: Москва
                        street: ул. Примерная
                        house: '1'
                        fullAddress: г. Москва, ул. Примерная, 1
                      sell_enabled: true
                      sell_emails: []
                      security_number: '+74951234567'
                      guest_scud_pass_limit: 21
                      buildings_properties_rent_available: true
                      resident_request_variant: resident-request-by-owner
                      paid_tickets_allowed: 'true'
                      meters:
                        mode: automatic
                        manual-update:
                          from_day_of_month: 5
                          until_day_of_month: 12
                          push_day_of_month: 11
                          notification_message: Передай показания
                    entrances2:
                    - number: 1
                      first_apartment: 1
                      last_apartment: 18
                    - number: 2
                      first_apartment: 19
                      last_apartment: 36
                    statistics:
                    - type: parking
                      title: Парковка
                      count: 30
                    - type: pantry
                      title: Кладовка
                      count: 15
                  meta:
                    current_page: 1
                    from: 1
                    last_page: 1
                    per_page: 1000
                    to: 40
                    total: 40
        '401':
          $ref: '#/components/responses/Unauthorized'
